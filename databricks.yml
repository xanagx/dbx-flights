bundle:
  name: flights-etl-snowflake

workspace:
  host: https://dbc-be9f3d93-6f4a.cloud.databricks.com

resources:
  jobs:
    flights_etl_job:
      name: flights-etl-job
      performance_target: STANDARD
      tasks:
        - task_key: bronze
          spark_python_task:
            python_file: src/etl/01_bronze.py
            parameters:
              - --config
              - conf/pipeline_config.yaml
          environment_key: default

        - task_key: silver
          depends_on:
            - task_key: bronze
          spark_python_task:
            python_file: src/etl/02_silver.py
            parameters:
              - --config
              - conf/pipeline_config.yaml
          environment_key: default

        - task_key: gold
          depends_on:
            - task_key: silver
          spark_python_task:
            python_file: src/etl/03_gold.py
            parameters:
              - --config
              - conf/pipeline_config.yaml
          environment_key: default
      environments:
        - environment_key: default
          spec:
            environment_version: "2"
            dependencies:
              - pyyaml

targets:
  dev:
    mode: development
    default: true
